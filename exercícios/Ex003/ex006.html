<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Somando Números</title>
    <style>
        body {
            background-color: rgba(0, 0, 255, 0.38);
            font: normal 18pt Arial;
        }
        input {
            font: normal 18pt Arial;
            width: 100px;
        }
        div {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Somando Valores</h1>
    <input type="number" name="text1" id="text1"> +
    <input type="number" name="text2" id="text2">
    <input type="button" value="Somar"onclick ="somar()">
    <div id="res">Resultado</div>

<script>
    // Function to sum two numbers / Função para somar dois números
    function somar() {
        // Get the first input element by its ID / Pega o primeiro input pelo ID
        var tn1 = document.getElementById('text1') 

        // Get the second input element using querySelector / Pega o segundo input usando querySelector
        var tn2 = document.querySelector('input#text2')

        // Get the div where we will display the result / Pega a div onde será exibido o resultado
        var res = document.getElementById('res')

        // Convert the first input value to a number / Converte o valor do primeiro input para número
        var n1 = Number(tn1.value)

        // Convert the second input value to a number / Converte o valor do segundo input para número
        var n2 = Number(tn2.value)

        // Calculate the sum of the two numbers / Calcula a soma dos dois números
        var soma = n1 + n2

        // Display the result in the div / Mostra o resultado na div
        res.innerHTML = `A soma entre ${n1} e  ${n2} é igual a ${soma}`
    }
</script>
</body>
</html>
