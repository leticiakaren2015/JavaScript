<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Loops</title>
</head>
<body>
    <h2>The do...while loop </h2>
    <p id="demo"></p>
    <script>
        let text = "";
        let i = 5;

        do {
            text += "The number is " + i + "<br>";
            i++
        }
        while(i < 20);

        
        document.getElementById('demo').innerHTML = text;
    </script>
</body>
</html>
